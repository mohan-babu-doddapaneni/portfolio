<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ===================== SECURITY HARDENING ===================== -->
    <!-- Strict Content-Security-Policy: everything is self-hosted (fonts,
         icons, images), so we lock origins down to 'self'. This blocks
         injected/3rd-party scripts, data exfiltration, and most XSS. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Anti-clickjacking: same-origin frame-buster (CSP-compliant). -->
    <script src="%PUBLIC_URL%/framebuster.js"></script>
    <!-- ============================================================== -->

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta
      name="description"
      content="Mohan Babu Doddapaneni — Full Stack Developer with 5+ years building scalable apps with Java, Spring Boot, React, Angular, and AWS. Experienced at Adobe, Capgemini, and Wipro."
    />
    <meta name="author" content="Mohan Babu Doddapaneni" />
    <meta
      name="keywords"
      content="Mohan Babu Doddapaneni, Full Stack Developer, Java, Spring Boot, React, Angular, AWS, Microservices, Software Engineer"
    />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mohan Babu Doddapaneni — Full Stack Developer" />
    <meta
      property="og:description"
      content="5+ years building scalable apps with Java, Spring Boot, React, Angular, and AWS. Experienced at Adobe, Capgemini, and Wipro."
    />
    <meta property="og:url" content="https://mohanbabudoddapaneni.com" />
    <meta property="og:image" content="%PUBLIC_URL%/assets/profile.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mohan Babu Doddapaneni — Full Stack Developer" />
    <meta
      name="twitter:description"
      content="5+ years building scalable apps with Java, Spring Boot, React, Angular, and AWS."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/assets/profile.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Mohan Babu Doddapaneni — Full Stack Developer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
